<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Paradox favicon - optimized for web -->
  <defs>
    <linearGradient id="paradoxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF4338;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E53935;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Red rounded background -->
  <rect width="100" height="100" rx="22" fill="url(#paradoxGrad)"/>

  <!-- 5-loop Paradox symbol optimized -->
  <!-- Outer strokes for depth -->
  <circle cx="50" cy="29" r="14" fill="none" stroke="#000000" stroke-width="9" opacity="0.3"/>
  <circle cx="70" cy="43" r="14" fill="none" stroke="#000000" stroke-width="9" opacity="0.3"/>
  <circle cx="62" cy="66" r="14" fill="none" stroke="#000000" stroke-width="9" opacity="0.3"/>
  <circle cx="38" cy="66" r="14" fill="none" stroke="#000000" stroke-width="9" opacity="0.3"/>
  <circle cx="30" cy="43" r="14" fill="none" stroke="#000000" stroke-width="9" opacity="0.3"/>

  <!-- Main strokes in white -->
  <circle cx="50" cy="29" r="14" fill="none" stroke="#FFFFFF" stroke-width="5"/>
  <circle cx="70" cy="43" r="14" fill="none" stroke="#FFFFFF" stroke-width="5"/>
  <circle cx="62" cy="66" r="14" fill="none" stroke="#FFFFFF" stroke-width="5"/>
  <circle cx="38" cy="66" r="14" fill="none" stroke="#FFFFFF" stroke-width="5"/>
  <circle cx="30" cy="43" r="14" fill="none" stroke="#FFFFFF" stroke-width="5"/>
</svg>
