    <!-- Dynamic favicon switcher for aq/paradox sections -->
    <script>
      (function() {
        const updateFavicon = () => {
          const path = window.location.pathname;
          const faviconLink = document.querySelector('link[rel="icon"]');
          const manifestLink = document.querySelector('link[rel="manifest"]');
          const themeColor = document.querySelector('meta[name="theme-color"]');

          if (path.startsWith('/paradox')) {
            if (faviconLink) faviconLink.href = '/paradox/favicon.svg';
            if (manifestLink) manifestLink.href = '/paradox/site.webmanifest';
            if (themeColor) themeColor.content = '#FF4338';
          } else {
            if (faviconLink) faviconLink.href = '/favicon.svg';
            if (manifestLink) manifestLink.href = '/site.webmanifest';
            if (themeColor) themeColor.content = '#F4EFE0';
          }
        };

        // Update on initial load
        updateFavicon();

        // Update on route changes (for SPA navigation)
        window.addEventListener('popstate', updateFavicon);

        // Listen for history changes
        const originalPushState = window.history.pushState;
        window.history.pushState = function(...args) {
          originalPushState.apply(window.history, args);
          updateFavicon();
        };
      })();
    </script>
